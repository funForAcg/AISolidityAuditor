services:
  auditor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - audit-data:/data/jobs
    env_file:
      - path: ./backend/.env
        required: false
    environment:
      - DATA_DIR=/data/jobs
      - MAX_UPLOAD_MB=10
      - MAX_ZIP_FILES=200
      - MAX_ZIP_FILE_MB=2
      - MAX_EXTRACTED_MB=30
      - SLITHER_TIMEOUT_SEC=120
      - MAX_AI_FINDINGS=20
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-3-5-haiku-latest}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-chat}
      - CORS_ORIGINS=*
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m
      # solc-select (imported by slither at startup) creates ~/.solc-select at
      # import time and crashes on a read-only filesystem without this mount.
      - /root/.solc-select:rw,noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 1g
    cpus: 1.5
    restart: unless-stopped

volumes:
  audit-data:
