services:
  auditor:
    build:
      context: .
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - audit-data:/data/jobs
    environment:
      - DATA_DIR=/data/jobs
      - MAX_UPLOAD_MB=10
      - SLITHER_TIMEOUT_SEC=120
      - MAX_AI_FINDINGS=20
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - CORS_ORIGINS=*
    restart: unless-stopped

volumes:
  audit-data:
