name: AISolidityAuditor Security Triage
description: Run Slither, optional AI explanations, Markdown report, findings JSON, and SARIF output.

inputs:
  openai_api_key:
    description: OpenAI-compatible API key for AI explanations.
    required: false
    default: ""
  anthropic_api_key:
    description: Anthropic API key for Claude explanations.
    required: false
    default: ""
  deepseek_api_key:
    description: DeepSeek API key for DeepSeek explanations.
    required: false
    default: ""
  ai_provider:
    description: "AI provider to use: openai, claude, or deepseek."
    required: false
    default: openai
  mode:
    description: Audit mode. Use standard or glamsterdam-readiness.
    required: false
    default: standard
  project_path:
    description: Solidity project path relative to the caller workspace.
    required: false
    default: "."
  output_dir:
    description: Directory for audit-report.md, slither.json, findings.json, and audit-results.sarif.
    required: false
    default: aisolidityauditor-results
  upload_sarif:
    description: Upload SARIF to GitHub code scanning.
    required: false
    default: "true"
  comment_on_pr:
    description: Post a truncated Markdown report as a pull request comment.
    required: false
    default: "false"
  fail_on_high:
    description: Fail the workflow when one or more High findings are present.
    required: false
    default: "false"
  fail_on_medium:
    description: Fail the workflow when one or more Medium findings are present.
    required: false
    default: "false"
  max_ai_findings:
    description: Maximum number of findings to send for assistive AI explanation.
    required: false
    default: "20"
  include_informational:
    description: Include Informational and Optimization findings in findings JSON, Markdown, and SARIF.
    required: false
    default: "true"
  sarif_category:
    description: Optional SARIF category used by GitHub code scanning.
    required: false
    default: ""

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Python dependencies
      shell: bash
      run: python -m pip install -r "$GITHUB_ACTION_PATH/backend/requirements.txt"

    - name: Install solc
      shell: bash
      run: |
        sudo curl -fsSL https://github.com/ethereum/solidity/releases/download/v0.8.20/solc-static-linux -o /usr/local/bin/solc
        sudo chmod +x /usr/local/bin/solc

    - name: Run Solidity security triage
      shell: bash
      run: |
        python "$GITHUB_ACTION_PATH/scripts/github_action_audit.py" \
          --project "$GITHUB_WORKSPACE/${{ inputs.project_path }}" \
          --output-dir "$GITHUB_WORKSPACE/${{ inputs.output_dir }}" \
          --ai-provider "${{ inputs.ai_provider }}" \
          --openai-api-key "${{ inputs.openai_api_key }}" \
          --anthropic-api-key "${{ inputs.anthropic_api_key }}" \
          --deepseek-api-key "${{ inputs.deepseek_api_key }}" \
          --mode "${{ inputs.mode }}" \
          --max-ai-findings "${{ inputs.max_ai_findings }}" \
          --include-informational "${{ inputs.include_informational }}" \
          --fail-on-high "${{ inputs.fail_on_high }}" \
          --fail-on-medium "${{ inputs.fail_on_medium }}"

    - name: Upload audit artifacts
      uses: actions/upload-artifact@v4
      with:
        name: aisolidityauditor-results
        path: |
          ${{ inputs.output_dir }}/audit-report.md
          ${{ inputs.output_dir }}/slither.json
          ${{ inputs.output_dir }}/findings.json
          ${{ inputs.output_dir }}/audit-results.sarif

    - name: Upload Glamsterdam readiness artifacts
      if: ${{ inputs.mode == 'glamsterdam-readiness' }}
      uses: actions/upload-artifact@v4
      with:
        name: aisolidityauditor-glamsterdam-readiness
        path: |
          ${{ inputs.output_dir }}/glamsterdam-readiness-report.md
          ${{ inputs.output_dir }}/glamsterdam-findings.json

    - name: Upload SARIF
      if: ${{ inputs.upload_sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: ${{ inputs.output_dir }}/audit-results.sarif
        category: ${{ inputs.sarif_category }}

    - name: Comment on pull request
      if: ${{ inputs.comment_on_pr == 'true' && github.event_name == 'pull_request' }}
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = `${{ inputs.output_dir }}/audit-report.md`;
          const report = fs.readFileSync(path, 'utf8');
          const body = [
            '## AISolidityAuditor security triage',
            '',
            report.length > 60000 ? `${report.slice(0, 60000)}\n\n_Report truncated. See uploaded artifact for the full report._` : report
          ].join('\n');
          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body
          });
